name: Daily Test Suite

on:
  schedule:
    # Runs at 11:00 AM UTC every day
    # To change the time, modify the cron expression below
    # Format: minute hour day month day-of-week
    - cron: "0 11 * * *"

  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: "11"
          distribution: "temurin"
          cache: maven

      - name: Run tests with Maven
        run: mvn clean test -v

      - name: Display test results
        if: always()
        run: |
          echo "=== Test Execution Complete ==="
          if [ -d "target/surefire-reports/" ]; then
            echo "TestNG Reports found:"
            ls -la target/surefire-reports/
          else
            echo "TestNG Reports directory not found"
          fi
          if [ -d "test-output/" ]; then
            echo "Extent Reports found:"
            ls -la test-output/
          else
            echo "Extent Reports directory not found"
          fi

      - name: Generate test report
        if: always()
        run: mvn surefire-report:report || true

      - name: Upload test results
        if: always() && hashFiles('target/surefire-reports/*') != ''
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/

      - name: Upload extent report
        if: always() && hashFiles('test-output/*') != ''
        uses: actions/upload-artifact@v4
        with:
          name: extent-report
          path: test-output/

      - name: Notify on failure
        if: failure()
        run: echo "Tests failed! Check the logs above for details. Maven output saved in logs."
